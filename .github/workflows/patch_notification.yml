name: Post-Patching Tenant Email Notification

on:
  workflow_run:
    workflows: ["generate-ascii-artwork"] 
    types:
      - completed

jobs:
  notify-tenant:
    # Use your self-hosted runner labels here if needed
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Send Tenant Email via Python
        env:
          # Template Variables
          TENANT_NAME: "X" 
          ENVIRONMENT: "Production"
          IMAGE_TAG: ${{ github.sha }}
          RECIPIENT_EMAIL: "balkishan1206.com"
          
          # SMTP Configuration & Secrets
          SMTP_SERVER: smtp.gmail.com
          SMTP_PORT: 587 # Usually 587 for TLS
          SMTP_USERNAME: balkishan108@gmail.com
          SMTP_PASSWORD: xcpf ygbo umau chgr
          SENDER_EMAIL: "balkishan108@gmail.com"
          
        run: |
          python scripts/send_email.py templates/tenant_email.html
