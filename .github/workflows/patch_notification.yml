name: Post-Patching Tenant Email Notification

on:
  workflow_run:
    workflows: ["generate-ascii-artwork"] 
    types:
      - completed

jobs:
  notify-tenant:
    # Use your self-hosted runner labels here if needed
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Send Tenant Email via Python
        env:
          # Template Variables
          TENANT_NAME: "X" 
          ENVIRONMENT: "Production"
          IMAGE_TAG: ${{ github.sha }}
          RECIPIENT_EMAIL: "x@y.com"
          
          # SMTP Configuration & Secrets
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }} # Usually 587 for TLS
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SENDER_EMAIL: "sre-team.x.com"
          
        run: |
          python scripts/send_email.py templates/tenant_email.html
