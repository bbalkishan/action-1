name: generate-ascii-artwork
on:
  # 1. Manual trigger with 'main' as the default branch
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run the playbook from'
        required: true
        default: 'main'
        type: string

  # 2. Scheduled cron trigger (Runs every 10 minutes)
  schedule:
    - cron: '0 0 26 * *'
jobs:
  ascii-job:
        runs-on: ubuntu-latest
        steps:
        - name: checkout repo
          uses: actions/checkout@v4
        - name: list repo files
          run: ls -ltra  
        - name: executing shell script
          run: |
            chmod +x ascii-script.sh
            ./ascii-script.sh
          
        
                           
